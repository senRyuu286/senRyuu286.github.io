<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Page Not Found | Justin Ramas</title>

    <script type="text/javascript">
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?/" +
          l.pathname
            .split("/")
            .slice(1 + segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search
            ? "&" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: rgba(255, 255, 255, 0.06);
        --primary: #818cf8;
        --primary-glow: rgba(129, 140, 248, 0.15);
        --text: #e2e8f0;
        --text-muted: #64748b;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* Subtle grid background matching portfolio style */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: linear-gradient(
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px
          ),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .error-code {
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 600;
        line-height: 1;
        color: var(--primary);
        opacity: 0.12;
        letter-spacing: -0.05em;
        animation: breathe 3s ease-in-out infinite;
        user-select: none;
      }

      .content {
        margin-top: -3rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--primary);
        background: var(--primary-glow);
        border: 1px solid rgba(129, 140, 248, 0.2);
        padding: 0.3rem 0.85rem;
        border-radius: 999px;
        margin-bottom: 0.25rem;
      }

      h1 {
        font-size: clamp(1.4rem, 4vw, 1.9rem);
        font-weight: 500;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      p {
        font-size: 0.95rem;
        font-weight: 300;
        color: var(--text-muted);
        max-width: 320px;
        line-height: 1.7;
      }

      /* Spinner */
      .spinner-wrap {
        margin-top: 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(129, 140, 248, 0.2);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      .spinner-label {
        font-size: 0.75rem;
        font-weight: 300;
        color: var(--text-muted);
        letter-spacing: 0.05em;
      }

      /* Glow orb */
      .orb {
        position: fixed;
        width: 480px;
        height: 480px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(129, 140, 248, 0.07) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.12;
        }
        50% {
          opacity: 0.2;
        }
      }
    </style>
  </head>

  <body>
    <div class="orb"></div>

    <div class="container">
      <div class="error-code">404</div>

      <div class="content">
        <span class="badge">Page not found</span>
        <h1>You've wandered off the path.</h1>
        <p>This page doesn't exist — but don't worry, you're being redirected back.</p>

        <div class="spinner-wrap">
          <div class="spinner"></div>
          <span class="spinner-label">Redirecting...</span>
        </div>
      </div>
    </div>
  </body>
</html>
