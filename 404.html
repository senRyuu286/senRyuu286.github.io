<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Justin Ramas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; color: #f9fafb; overflow: hidden; }
        .gradient-bg {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%);
        }
    </style>
    
    <script type="text/javascript">
        var pathSegmentsToKeep = 0;
        var l = window.location;
        // This will trigger after a brief delay so the user can see the cool 404 page
        setTimeout(function() {
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
                l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        }, 2500); // 2.5 second delay so they see the 404 UI
    </script>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center font-sans">

    <div class="text-center px-4">
        <h1 class="text-9xl font-bold text-indigo-500 opacity-20 animate-pulse">404</h1>
        
        <div class="relative -mt-20">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Lost in space?</h2>
            <p class="text-gray-400 text-lg mb-8 max-w-md mx-auto">
                The page you are looking for doesn't exist or has been moved. 
                <span class="text-indigo-400">Redirecting you home...</span>
            </p>

            <div class="flex justify-center">
                <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </div>

</body>
</html>
