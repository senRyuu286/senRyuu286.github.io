<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Not Found | Justin Ramas</title>
    
    <style>
      :root {
        --bg: #030712;
        --text: #f9fafb;
        --primary: #6366f1;
        --secondary: #9ca3af;
      }

      body { 
        background-color: var(--bg); 
        color: var(--text); 
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .container { text-align: center; padding: 20px; position: relative; }

      h1 { 
        font-size: 8rem; 
        font-weight: 900; 
        margin: 0; 
        color: var(--primary); 
        opacity: 0.1; 
        animation: pulse 2s infinite; 
      }

      .content { margin-top: -4rem; position: relative; }

      h2 { font-size: 2rem; margin-bottom: 0.5rem; }

      p { color: var(--secondary); font-size: 1.1rem; margin-bottom: 2rem; }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid var(--primary);
        border-top-color: transparent;
        border-radius: 50%;
        margin: 0 auto;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
      }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.2; } }
    </style>

    <script type="text/javascript">
      var segmentCount = 0; 
      var l = window.location;

      setTimeout(function() {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
          l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }, 1500);
    </script>
  </head>
  
  <body>
    <div class="container">
      <h1>404</h1>
      <div class="content">
        <h2>Whoops! You're off-track.</h2>
        <p>Taking you back to the main site...</p>
        <div class="spinner"></div>
      </div>
    </div>
  </body>
</html>
